<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaVault Pro | GitHub Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        .type-card { transition: all 0.2s; cursor: pointer; border: 2px solid transparent; background: white; }
        .type-card.active { border-color: #4f46e5; background: #eef2ff; }
        .media-card { transition: all 0.3s ease; background: white; border-radius: 1.5rem; border: 1px solid #f1f5f9; overflow: hidden; height: 100%; }
        
        /* Layout Fixes from your Local Code */
        .list-view .media-grid { display: flex; flex-direction: column; gap: 0.75rem; }
        .list-view .media-card { display: flex; align-items: center; padding: 0.75rem 1.25rem; }
        .list-view .thumb-area { width: 50px; height: 50px; border-radius: 12px; flex-shrink: 0; }
        .list-view .content-area { display: flex; flex: 1; justify-content: space-between; align-items: center; padding-left: 1rem; }
        .list-view .action-group { margin-top: 0 !important; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .player-overlay { position: fixed; inset: 0; background: white; z-index: 3000; display: none; }
        .btn-action { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; background: #f1f5f9; color: #64748b; }
        .btn-action:hover { background: #4f46e5; color: white; }
        .folder-chip { cursor: pointer; transition: all 0.2s; border: 1px solid #e2e8f0; font-size: 10px; font-weight: 700; white-space: nowrap; }
        .folder-chip.active { background: #4f46e5; color: white; border-color: #4f46e5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Login Screen Style */
        #authScreen { position: fixed; inset: 0; background: #f8fafc; z-index: 5000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center border border-slate-100">
            <h2 class="text-xl font-bold mb-6">Vault Access</h2>
            <input type="email" id="loginEmail" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl mb-3 outline-none border border-transparent focus:border-indigo-500">
            <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl mb-6 outline-none border border-transparent focus:border-indigo-500">
            <button id="loginBtn" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold uppercase text-xs">Masuk</button>
        </div>
    </div>

    <div id="appScreen" style="display:none;">
        <nav class="glass-nav sticky top-0 z-50 px-6 py-4">
            <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center justify-between w-full md:w-auto gap-4">
                    <h1 class="text-xl font-bold text-indigo-600">VAULT<span class="text-slate-900">PRO</span></h1>
                    <button onclick="logout()" class="text-[10px] font-bold text-rose-500 md:hidden">LOGOUT</button>
                </div>
                <div class="flex items-center gap-2 w-full md:w-auto">
                    <div class="relative flex-1 md:w-64">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400 text-[10px]"></i>
                        <input type="text" id="searchInput" placeholder="Cari media..." class="w-full pl-9 pr-4 py-2 bg-slate-100 rounded-xl text-xs outline-none">
                    </div>
                    <button onclick="toggleLayout()" class="btn-action"><i id="layoutIcon" class="fa-solid fa-table-cells-large"></i></button>
                    <button onclick="swapOrder()" class="btn-action"><i class="fa-solid fa-arrow-up-z-a"></i></button>
                    <button onclick="logout()" class="btn-action hidden md:flex"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto px-4 md:px-6 py-8">
            <section class="mb-10 text-center">
                <div class="flex justify-start md:justify-center gap-3 mb-6 overflow-x-auto pb-2 no-scrollbar">
                    <div onclick="selectType('3d', this)" class="type-card p-4 rounded-2xl min-w-[75px] shadow-sm active">
                        <i class="fa-solid fa-cube text-indigo-500 text-xl"></i>
                        <p class="text-[9px] font-bold mt-2 uppercase">3D</p>
                    </div>
                    <div onclick="selectType('image', this)" class="type-card p-4 rounded-2xl min-w-[75px] shadow-sm">
                        <i class="fa-solid fa-image text-emerald-500 text-xl"></i>
                        <p class="text-[9px] font-bold mt-2 uppercase">Imej</p>
                    </div>
                    <div onclick="selectType('video', this)" class="type-card p-4 rounded-2xl min-w-[75px] shadow-sm">
                        <i class="fa-solid fa-clapperboard text-rose-500 text-xl"></i>
                        <p class="text-[9px] font-bold mt-2 uppercase">Video</p>
                    </div>
                    <div onclick="selectType('audio', this)" class="type-card p-4 rounded-2xl min-w-[75px] shadow-sm">
                        <i class="fa-solid fa-headphones text-amber-500 text-xl"></i>
                        <p class="text-[9px] font-bold mt-2 uppercase">Audio</p>
                    </div>
                </div>

                <div id="inputArea" class="max-w-3xl mx-auto bg-white p-5 rounded-[2rem] shadow-xl border border-slate-100 hidden">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                        <input type="text" id="fileName" placeholder="Nama Fail" class="p-3 bg-slate-50 rounded-xl text-sm outline-none">
                        <input type="number" id="fileSize" placeholder="Saiz (MB)" class="p-3 bg-slate-50 rounded-xl text-sm outline-none">
                        <select id="folderSelect" class="p-3 bg-slate-50 rounded-xl text-sm outline-none"></select>
                    </div>
                    <div class="flex flex-col md:flex-row gap-3">
                        <input type="text" id="fileUrl" placeholder="Tampal Link Dropbox..." class="flex-1 p-3 bg-slate-50 rounded-xl text-sm outline-none">
                        <button id="addBtn" class="w-full md:w-auto bg-indigo-600 text-white px-8 py-3.5 rounded-xl font-bold text-xs uppercase">Simpan</button>
                    </div>
                </div>
            </section>

            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                <div id="folderList" class="flex gap-2 overflow-x-auto w-full md:w-auto pb-2 no-scrollbar"></div>
                <select id="sortFilter" onchange="renderMedia()" class="bg-white px-4 py-2 rounded-full border border-slate-200 text-[10px] font-bold uppercase outline-none">
                    <option value="date">Tarikh</option>
                    <option value="name">Nama (A-Z)</option>
                    <option value="size">Saiz</option>
                </select>
            </div>

            <div id="mediaContainer">
                <div id="mediaGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            </div>
        </main>
    </div>

    <div id="modalUI" class="overlay" onclick="if(event.target==this) closeModal()">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 text-center relative shadow-2xl">
            <div id="modalIcon" class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl"></div>
            <h2 id="modalTitle" class="text-lg font-bold"></h2>
            <p id="modalSub" class="text-[10px] text-slate-400 uppercase mt-1 mb-6"></p>
            <div id="infoDetails" class="text-left bg-slate-50 p-5 rounded-2xl mb-6 hidden space-y-2 text-xs"></div>
            <textarea id="modalBox" readonly class="w-full h-24 bg-slate-50 border border-slate-200 rounded-2xl p-4 text-[10px] mb-6 hidden outline-none"></textarea>
            <button id="modalActionBtn" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold text-xs uppercase">Tindakan</button>
        </div>
    </div>

    <div id="playerUI" class="player-overlay">
        <button onclick="closePlayer()" class="absolute top-6 left-6 z-[3100] bg-white w-12 h-12 rounded-full shadow-lg flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
        <div id="playerContent" class="w-full h-full flex items-center justify-center p-6"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6i4I3x2M8PbfBMz_jWaQja3WFDQOvEus",
            authDomain: "mymediavault-af050.firebaseapp.com",
            projectId: "mymediavault-af050",
            storageBucket: "mymediavault-af050.firebasestorage.app",
            appId: "1:364554672192:web:578874137d9c2a50cde7a5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let allMedia = [], selectedType = '', currentFolder = 'Semua', isGridView = true, isReversed = false;
        let folders = JSON.parse(localStorage.getItem('vault_folders')) || ['Utama', 'Kerja', 'Backup'];

        // AUTH SYSTEM
        document.getElementById('loginBtn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value)
            .catch(err => alert("Gagal: " + err.message));
        };
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                startListening();
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('appScreen').style.display = 'none';
            }
        });

        // DROPBOX FIX FUNCTION
        function fixUrl(url) {
            if (url.includes('dropbox.com')) {
                let clean = url.replace('www.dropbox.com', 'dl.dropboxusercontent.com').split('?')[0];
                return clean + "?raw=1";
            }
            return url;
        }

        function startListening() {
            onSnapshot(query(collection(db, "media"), orderBy("created", "desc")), (snap) => {
                allMedia = []; snap.forEach(d => allMedia.push({id: d.id, ...d.data()}));
                renderMedia();
            });
            updateFolderUI();
        }

        window.selectType = (type, el) => {
            selectedType = type;
            document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('inputArea').classList.remove('hidden');
        };

        window.toggleLayout = () => {
            isGridView = !isGridView;
            document.getElementById('mediaContainer').className = isGridView ? "" : "list-view";
            renderMedia();
        };

        window.swapOrder = () => { isReversed = !isReversed; renderMedia(); };

        window.createNewFolder = () => {
            const n = prompt("Nama folder baru:");
            if(n && !folders.includes(n)) { 
                folders.push(n); localStorage.setItem('vault_folders', JSON.stringify(folders)); updateFolderUI(); 
            }
        };

        function updateFolderUI() {
            const list = document.getElementById('folderList');
            const select = document.getElementById('folderSelect');
            list.innerHTML = `<button onclick="filterFolder('Semua')" class="folder-chip px-5 py-2 rounded-full ${currentFolder === 'Semua' ? 'active' : 'bg-white'}">SEMUA</button>`;
            select.innerHTML = '';
            folders.forEach(f => {
                list.innerHTML += `<button onclick="filterFolder('${f}')" class="folder-chip px-5 py-2 rounded-full ${currentFolder === f ? 'active' : 'bg-white'}">${f.toUpperCase()}</button>`;
                select.innerHTML += `<option value="${f}">${f}</option>`;
            });
            list.innerHTML += `<button onclick="createNewFolder()" class="px-4 py-2 rounded-full border border-dashed border-slate-300 text-slate-400"><i class="fa-solid fa-plus"></i></button>`;
        }

        window.filterFolder = (f) => { currentFolder = f; updateFolderUI(); renderMedia(); };

        document.getElementById('addBtn').onclick = async () => {
            let url = document.getElementById('fileUrl').value.trim();
            const name = document.getElementById('fileName').value.trim();
            const size = parseFloat(document.getElementById('fileSize').value) || 0;
            const folder = document.getElementById('folderSelect').value;
            if(!url || !name || !selectedType) return alert("Lengkapkan borang!");
            
            await addDoc(collection(db, "media"), { name, url, type: selectedType, folder, size, created: Date.now() });
            document.getElementById('fileUrl').value = ''; document.getElementById('fileName').value = '';
        };

        window.renderMedia = () => {
            const grid = document.getElementById('mediaGrid');
            const sort = document.getElementById('sortFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const iconL = document.getElementById('layoutIcon');

            iconL.className = isGridView ? "fa-solid fa-table-cells-large" : "fa-solid fa-list";
            grid.className = isGridView ? "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" : "media-grid";

            let filtered = allMedia.filter(m => (currentFolder === 'Semua' || m.folder === currentFolder) && m.name.toLowerCase().includes(search));
            if(sort === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
            if(sort === 'size') filtered.sort((a,b) => b.size - a.size);
            if(isReversed) filtered.reverse();

            grid.innerHTML = '';
            filtered.forEach(m => {
                const icon = {'3d':'fa-cube','image':'fa-image','video':'fa-clapperboard','audio':'fa-headphones'}[m.type];
                const color = {'3d':'text-indigo-500','image':'text-emerald-500','video':'text-rose-500','audio':'text-amber-500'}[m.type];
                const cleanUrl = fixUrl(m.url);

                grid.innerHTML += `
                    <div class="media-card group">
                        <div class="thumb-area h-36 bg-slate-50 flex items-center justify-center relative">
                            <i class="fa-solid ${icon} ${color} text-2xl opacity-10"></i>
                            ${m.type === 'image' ? `<img src="${cleanUrl}" crossorigin="anonymous" class="absolute inset-0 w-full h-full object-cover">` : ''}
                        </div>
                        <div class="content-area p-4">
                            <div>
                                <h3 class="text-[10px] font-bold text-slate-800 truncate">${m.name}</h3>
                                <p class="text-[8px] text-slate-400 font-bold mt-1 uppercase">${m.folder} • ${m.size}MB</p>
                            </div>
                            <div class="action-group flex gap-1.5 mt-4">
                                <button onclick="openPlayer('${m.id}')" class="btn-action"><i class="fa-solid fa-eye text-[10px]"></i></button>
                                <button onclick="showShare('${m.id}')" class="btn-action"><i class="fa-solid fa-link text-[10px]"></i></button>
                                <button onclick="showInfo('${m.id}')" class="btn-action"><i class="fa-solid fa-info text-[10px]"></i></button>
                                <button onclick="deleteMedia('${m.id}')" class="btn-action hover:!bg-rose-500 hover:!text-white ml-auto"><i class="fa-solid fa-trash text-[10px]"></i></button>
                            </div>
                        </div>
                    </div>`;
            });
        };

        window.showShare = (id) => {
            const embed = `<iframe src="${window.location.href.split('?')[0]}?id=${id}" width="100%" height="500px" frameborder="0"></iframe>`;
            openModal("Embed Kod", "Salin untuk Notion", 'bg-indigo-50 text-indigo-600', '<i class="fa-solid fa-share-nodes"></i>', embed, "Salin", () => copyText(embed), true);
        };

        window.showInfo = (id) => {
            const m = allMedia.find(x => x.id === id);
            const info = `<p><b>NAMA:</b> ${m.name}</p><p><b>FOLDER:</b> ${m.folder}</p><p><b>SAIZ:</b> ${m.size}MB</p><p class="break-all"><b>URL:</b> ${m.url}</p>`;
            openModal("Maklumat Fail", "Butiran teknikal", 'bg-amber-50 text-amber-500', '<i class="fa-solid fa-info"></i>', info, "Tutup", closeModal, false, true);
        };

        function openModal(title, sub, iconClass, iconHtml, content, btnText, action, showBox=false, showInfo=false) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalSub').innerText = sub;
            const iconDiv = document.getElementById('modalIcon');
            iconDiv.className = `w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl ${iconClass}`;
            iconDiv.innerHTML = iconHtml;
            document.getElementById('modalBox').value = showBox ? content : '';
            document.getElementById('modalBox').classList.toggle('hidden', !showBox);
            document.getElementById('infoDetails').innerHTML = showInfo ? content : '';
            document.getElementById('infoDetails').classList.toggle('hidden', !showInfo);
            const btn = document.getElementById('modalActionBtn');
            btn.innerText = btnText; btn.onclick = action;
            document.getElementById('modalUI').style.display = 'flex';
        }

        async function copyText(t) {
            try { await navigator.clipboard.writeText(t); } catch { const el = document.createElement("textarea"); el.value = t; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); }
            alert("Disalin!");
        }

        window.closeModal = () => document.getElementById('modalUI').style.display = 'none';
        window.closePlayer = () => { document.getElementById('playerContent').innerHTML = ''; document.getElementById('playerUI').style.display = 'none'; };
        window.deleteMedia = async (id) => { if(confirm("Padam?")) await deleteDoc(doc(db, "media", id)); };
        
        window.openPlayer = (id) => {
            const m = allMedia.find(x => x.id === id);
            const url = fixUrl(m.url);
            const content = document.getElementById('playerContent');
            document.getElementById('playerUI').style.display = 'flex';
            if (m.type === 'image') content.innerHTML = `<img src="${url}" crossorigin="anonymous" class="max-w-full max-h-full object-contain">`;
            else if (m.type === 'video') content.innerHTML = `<video src="${url}" controls autoplay class="max-w-full max-h-full"></video>`;
            else if (m.type === '3d') content.innerHTML = `<model-viewer src="${url}" crossorigin="anonymous" autoplay camera-controls shadow-intensity="1" class="w-full h-full"></model-viewer>`;
            else if (m.type === 'audio') content.innerHTML = `<div class="bg-white p-10 rounded-3xl"><audio src="${url}" controls autoplay></audio></div>`;
        };

        document.getElementById('searchInput').oninput = renderMedia;
        updateFolderUI();
    </script>
</body>
</html>
